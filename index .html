function saveEdit(){if(editId===null)return;var n=document.getElementById('editName').value.trim();var p=parseInt(document.getElementById('editPrice').value)||0;var im=document.getElementById('editImg').value.trim();for(var i=0;i<items.length;i++)if(items[i].id===editId){if(n)items[i].n=n;if(p>0)items[i].p=p;if(im)items[i].im=im;break;}localStorage.setItem('anil-items-100',JSON.stringify(items));closeEdit();applyF(document.getElementById('sI').value||'');alert('Product Updated!');}
function deleteProd(){if(editId===null)return;if(!confirm('Delete this product?'))return;for(var i=0;i<items.length;i++)if(items[i].id===editId){items.splice(i,1);break;}localStorage.setItem('anil-items-100',JSON.stringify(items));closeEdit();applyF('');upd();alert('Deleted');}
function addNewProduct(){var n=prompt('Product Name likho','New Product');if(!n)return;var p=parseInt(prompt('Price','699'))||699;var newId=items.length?Math.max.apply(null,items.map(function(x){return x.id;}))+1:1;items.unshift({id:newId,n:n,p:p,o:p+500,c:"Anil",im:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400"});localStorage.setItem('anil-items-100',JSON.stringify(items));applyF('');alert('New Product Added!');}

function closeOrders(){document.getElementById('ordersM').classList.add('hidden');}
