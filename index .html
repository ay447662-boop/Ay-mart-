<!DOCTYPE html>
<html lang="hi">
<head><style>
@font-face {
  font-family: "Optimistic";
  font-style: normal;
  font-weight: 400 600;
  font-display: swap;
  src: url("/fonts/OptimisticAI_VF_Optimized.woff2") format("woff2");
}
@font-face {
  font-family: "Optimistic Mono";
  font-style: normal;
  font-weight: 400;
  font-display: swap;
  src: url("/fonts/OptimisticMono_W_TextRegular.woff2") format("woff2");
}
:where(html) {
  font-family: "Optimistic", system-ui, sans-serif;
}
:where(code, pre, kbd, samp) {
  font-family: "Optimistic Mono", ui-monospace, monospace;
}
</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Anil AI Pro</title>
<meta name="theme-color" content="#5b21b6">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Voice aur Photo se baat karne wala AI assistant">
<link id="manifestLink" rel="manifest" href="">
<style>
:root{
  --bg:#0f0f1a;
  --bg2:#151528;
  --card:#1e1e2f;
  --purple:#5b21b6;
  --blue:#2563eb;
  --purple2:#7c3aed;
  --text:#e5e7eb;
  --text-dim:#9ca3af;
  --border:rgba(255,255,255,.08);
  --shadow:0 10px 30px rgba(0,0,0,.4);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;padding:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;overscroll-behavior:none}
body{display:flex;justify-content:center}
.app{width:100%;max-width:720px;height:100dvh;display:flex;flex-direction:column;position:relative;background:radial-gradient(1200px 800px at 50% -200px,#1c1c3a 0%, transparent 60%),var(--bg);}

/* HEADER */
header{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));background:linear-gradient(135deg,var(--purple),var(--blue));box-shadow:0 8px 24px rgba(37,99,235,.25);backdrop-filter:saturate(1.2) blur(10px)}
.avatar{width:44px;height:44px;border-radius:14px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;color:white;box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 4px 12px rgba(0,0,0,.2)}
.title{display:flex;flex-direction:column;gap:3px;min-width:0}
.title h1{margin:0;font-size:18px;line-height:1;font-weight:700;color:white;letter-spacing:.2px}
.title p{margin:0;font-size:12.5px;color:rgba(255,255,255,.9);display:flex;align-items:center;gap:6px;white-space:nowrap}
.dot{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 0 rgba(34,197,94,.7);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.7)}70%{box-shadow:0 0 0 8px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
.menuBtn{margin-left:auto;width:38px;height:38px;border:none;border-radius:12px;background:rgba(255,255,255,.14);color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s}
.menuBtn:active{transform:scale(.94)}

/* SETTINGS */
.settings{position:absolute;top:calc(60px + env(safe-area-inset-top));right:12px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:8px;min-width:200px;box-shadow:var(--shadow);z-index:30;display:none}
.settings.show{display:block;animation:slide .18s ease-out}
@keyframes slide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.settings button{width:100%;display:flex;align-items:center;gap:10px;padding:12px 12px;border:none;background:transparent;color:var(--text);font-size:14px;border-radius:10px;cursor:pointer;text-align:left}
.settings button:hover{background:rgba(255,255,255,.06)}
.settings svg{width:18px;height:18px;opacity:.9}

/* CHAT */
#chat{flex:1;overflow-y:auto;padding:20px 14px 16px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
#chat::-webkit-scrollbar{width:0}
.bubble{max-width:84%;padding:12px 15px;border-radius:20px;font-size:15.5px;line-height:1.5;position:relative;animation:pop .24s cubic-bezier(.2,.8,.2,1);box-shadow:0 6px 16px rgba(0,0,0,.22);word-wrap:break-word;overflow-wrap:anywhere}
.bubble.ai{align-self:flex-start;background:var(--card);color:var(--text);border-bottom-left-radius:6px;border:1px solid var(--border)}
.bubble.user{align-self:flex-end;background:linear-gradient(135deg,var(--purple2),var(--purple));color:white;border-bottom-right-radius:6px;box-shadow:0 8px 20px rgba(91,33,182,.35)}
.bubble img{width:100%;max-width:280px;height:auto;border-radius:14px;display:block;margin-bottom:8px;background:#0b0b15}
.bubble .time{font-size:10.5px;opacity:.65;margin-top:6px;text-align:right}
.typing{display:flex;gap:5px;align-items:center;padding:14px 16px}
.typing span{width:6px;height:6px;background:#a1a1b5;border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
@keyframes pop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}

/* PREVIEW */
.preview{margin:0 12px 8px;background:#141426;border:1px solid var(--border);border-radius:16px;padding:8px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 14px rgba(0,0,0,.25)}
.preview.hidden{display:none}
.preview img{width:56px;height:56px;object-fit:cover;border-radius:10px}
.preview .p-text{flex:1;font-size:13px;color:#cbd5e1}
.preview button{width:30px;height:30px;border:none;border-radius:50%;background:rgba(255,255,255,.1);color:white;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* INPUT BAR */
footer{position:sticky;bottom:0;z-index:15;padding:10px 12px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(to top, rgba(15,15,26,1) 60%, rgba(15,15,26,0));}
.input-bar{display:flex;align-items:flex-end;gap:8px;background:#15152a;border:1px solid var(--border);padding:8px;border-radius:26px;box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.04)}
.iconBtn{width:42px;height:42px;flex:0 0 42px;border:none;background:transparent;color:#b4beff;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.18s}
.iconBtn:active{transform:scale(.92)}
.iconBtn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#sendBtn{background:linear-gradient(135deg,var(--purple2),var(--blue));color:white;box-shadow:0 8px 18px rgba(37,99,235,.35)}
#sendBtn svg{fill:currentColor;stroke:none;width:20px;height:20px}
#textInput{flex:1;background:transparent;border:none;outline:none;color:white;font-size:15.5px;line-height:1.45;padding:9px 4px;max-height:120px;min-height:24px;resize:none}
#textInput::placeholder{color:#7e80a3}
#micBtn.listening{color:#fb7185;animation:micPulse 1.4s infinite}
@keyframes micPulse{0%{box-shadow:0 0 0 0 rgba(251,113,133,.55)}70%{box-shadow:0 0 0 12px rgba(251,113,133,0)}100%{box-shadow:0 0 0 0 rgba(251,113,133,0)}}

/* Big premium look on larger screens */
@media (min-width:740px){
  .app{border-left:1px solid var(--border);border-right:1px solid var(--border)}
  .bubble{font-size:16px;padding:14px 18px}
  header{padding:18px 20px}
  .title h1{font-size:20px}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="avatar">A</div>
    <div class="title">
      <h1>Anil AI Pro</h1>
      <p><span class="dot"></span> Voice • Photo • Online</p>
    </div>
    <button class="menuBtn" id="menuBtn" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
    </button>
    <div class="settings" id="settings">
      <button id="clearBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        Clear chat
      </button>
      <button id="installBtn" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Install app
      </button>
    </div>
  </header>

  <main id="chat" aria-live="polite"></main>

  <div id="preview" class="preview hidden">
    <img alt="preview">
    <div class="p-text">Photo ready hai</div>
    <button id="previewClose" aria-label="Hatao">✕</button>
  </div>

  <footer>
    <div class="input-bar">
      <button class="iconBtn" id="photoBtn" aria-label="Photo">
        <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </button>
      <textarea id="textInput" rows="1" placeholder="Kuch likhein... / Type here"></textarea>
      <button class="iconBtn" id="micBtn" aria-label="Mic">
        <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <button class="iconBtn" id="sendBtn" aria-label="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </footer>
</div>

<input type="file" id="photoInput" accept="image/*" hidden>

<script>
(() => {
  const chat = document.getElementById('chat');
  const textInput = document.getElementById('textInput');
  const sendBtn = document.getElementById('sendBtn');
  const micBtn = document.getElementById('micBtn');
  const photoBtn = document.getElementById('photoBtn');
  const photoInput = document.getElementById('photoInput');
  const preview = document.getElementById('preview');
  const previewImg = preview.querySelector('img');
  const previewClose = document.getElementById('previewClose');
  const menuBtn = document.getElementById('menuBtn');
  const settings = document.getElementById('settings');
  const clearBtn = document.getElementById('clearBtn');
  const installBtn = document.getElementById('installBtn');

  let messages = [];
  let pendingImage = null;
  let deferredPrompt = null;
  const STORAGE_KEY = 'anilAiProChat';

  const escapeHtml = s => s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const formatTime = t => new Date(t).toLocaleTimeString('hi-IN',{hour:'2-digit',minute:'2-digit'});

  function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(messages)); }
  function addMessage({sender,text,image,time=Date.now()}, persist=true){
    const div = document.createElement('div');
    div.className = 'bubble ' + sender;
    let html = '';
    if(image) html += `<img src="${image}" alt="photo">`;
    if(text) html += `<div>${escapeHtml(text)}</div>`;
    html += `<div class="time">${formatTime(time)}</div>`;
    div.innerHTML = html;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    const msg = {sender,text:text||'',image:image||null,time};
    if(persist) { messages.push(msg); save(); }
    return msg;
  }

  function showTyping(){
    const div = document.createElement('div');
    div.className = 'bubble ai typing';
    div.id = 'typing';
    div.innerHTML = '<span></span><span></span>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }
  function hideTyping(){ document.getElementById('typing')?.remove(); }

  function getAIReply(text, hasImage){
    const t = (text||'').toLowerCase();
    if(hasImage) return "Photo mil gaya, bahut badhiya!";
    if(/(namaste|namaskar|hello|hi|hey|hanji|ram ram)/.test(t)) return "Namaste Anil! Kaise madad karun?";
    return "Samajh gaya Anil, main yahan hoon.";
  }

  function send(){
    const text = textInput.value.trim();
    if(!text && !pendingImage) return;
    const userText = text || (pendingImage ? "[Photo bheja]" : "");
    addMessage({sender:'user', text:userText, image:pendingImage});
    textInput.value=''; autoResize();
    const img = pendingImage; pendingImage = null; preview.classList.add('hidden');
    if('vibrate' in navigator) navigator.vibrate(8);
    showTyping();
    setTimeout(()=>{
      hideTyping();
      const reply = getAIReply(text, !!img);
      addMessage({sender:'ai', text:reply});
    }, 800 + Math.random()*400);
  }

  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){ messages = JSON.parse(raw); messages.forEach(m=>addMessage(m,false)); }
    }catch(e){}
    if(messages.length===0){
      const init = {sender:'ai', text:"Namaste Anil! 🙏 Main Anil AI Pro hoon. Voice aur Photo dono se baat karo!", time:Date.now()};
      messages.push(init); save(); addMessage(init,false);
    }
    setTimeout(()=>chat.scrollTop=chat.scrollHeight,50);
  }

  function autoResize(){ textInput.style.height='auto'; textInput.style.height = Math.min(textInput.scrollHeight,120)+'px'; }
  textInput.addEventListener('input', autoResize);
  textInput.addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }});
  sendBtn.onclick = send;

  photoBtn.onclick = ()=> photoInput.click();
  photoInput.onchange = e=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => { pendingImage = ev.target.result; previewImg.src = pendingImage; preview.classList.remove('hidden'); textInput.focus(); };
    reader.readAsDataURL(file);
    photoInput.value='';
  };
  previewClose.onclick = ()=>{ pendingImage=null; preview.classList.add('hidden'); };

  // Voice
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition, listening=false;
  if(SpeechRecognition){
    recognition = new SpeechRecognition();
    recognition.lang = 'hi-IN';
    recognition.interimResults = false;
    recognition.continuous = false;
    recognition.onstart = ()=>{ listening=true; micBtn.classList.add('listening'); };
    recognition.onend = ()=>{ listening=false; micBtn.classList.remove('listening'); };
    recognition.onerror = ()=>{ listening=false; micBtn.classList.remove('listening'); };
    recognition.onresult = e => {
      const transcript = e.results[0][0].transcript;
      textInput.value = transcript;
      autoResize();
      textInput.focus();
    };
    micBtn.onclick = ()=>{ if(listening){ recognition.stop(); } else { try{ recognition.start(); }catch{} } };
  } else {
    micBtn.onclick = ()=> alert('Voice input aapke browser me support nahi hai. Chrome me try karein.');
    micBtn.style.opacity=.6;
  }

  menuBtn.onclick = e=>{ e.stopPropagation(); settings.classList.toggle('show'); };
  document.addEventListener('click', e=>{ if(!settings.contains(e.target) && e.target!==menuBtn) settings.classList.remove('show'); });

  clearBtn.onclick = ()=>{
    if(confirm('Saare messages delete karen?')){
      messages=[]; localStorage.removeItem(STORAGE_KEY); chat.innerHTML='';
      const init={sender:'ai', text:"Namaste Anil! 🙏 Main Anil AI Pro hoon. Voice aur Photo dono se baat karo!", time:Date.now()};
      messages.push(init); save(); addMessage(init,false);
      settings.classList.remove('show');
    }
  };

  window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); deferredPrompt=e; installBtn.style.display='flex'; });
  installBtn.onclick = async ()=>{
    settings.classList.remove('show');
    if(deferredPrompt){ deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; installBtn.style.display='none'; }
    else { alert('Install karne ke liye browser menu > Add to Home Screen / Install App chunein'); }
  };

  // PWA Manifest
  const manifestLink = document.getElementById('manifestLink');
  const svgIcon = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%235b21b6'/><stop offset='100%' stop-color='%232563eb'/></linearGradient></defs><rect width='512' height='512' rx='120' fill='url(%23g)'/><text x='50%' y='57%' dominant-baseline='middle' text-anchor='middle' font-family='Arial,Helvetica,sans-serif' font-size='310' font-weight='800' fill='white'>A</text></svg>`;
  const icon = 'data:image/svg+xml,'+encodeURIComponent(svgIcon);
  const manifest = {
    name:"Anil AI Pro",
    short_name:"Anil AI",
    description:"Voice aur Photo se baat karne wala AI assistant",
    display:"standalone",
    start_url:".",
    scope:".",
    theme_color:"#5b21b6",
    background_color:"#0f0f1a",
    icons:[
      {src:icon, sizes:"192x192", type:"image/svg+xml", purpose:"any maskable"},
      {src:icon, sizes:"512x512", type:"image/svg+xml", purpose:"any maskable"}
    ]
  };
  manifestLink.href = URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'}));

  // Service Worker
  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>{
      const swCode = `
        const CACHE='anil-ai-pro-v2';
        self.addEventListener('install', e=>{ self.skipWaiting(); e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['./']).catch(()=>{}))); });
        self.addEventListener('activate', e=>{ e.waitUntil(self.clients.claim()); });
        self.addEventListener('fetch', e=>{
          e.respondWith(
            fetch(e.request).then(r=>{ const copy=r.clone(); caches.open(CACHE).then(c=>c.put(e.request,copy)); return r; })
            .catch(()=>caches.match(e.request).then(m=>m||new Response('Offline', {status:503})))
          );
        });
      `;
      const blob = new Blob([swCode], {type:'text/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(blob), {scope:'./'}).catch(()=>{});
    });
  }

  load();
  setTimeout(()=>textInput.focus(),300);
})();
</script>

setAttribute("tabindex","-1");try{body.focus({preventScroll:true});}catch(e){try{body.focus();}catch(e2){}}}window.addEventListener("message",function(event){if(event.source!==window.parent)return;var data=event.data;if(!data||typeof data!=="object"||data.type!==FOCUS_TYPE)return;if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",focusArtifactDocument,{once:true});return;}focusArtifactDocument();});window.addEventListener("keydown",function(event){if(event.key!=="Escape")return;window.setTimeout(function(){if(event.defaultPrevented)return;window.parent.postMessage({type:CLOSE_TYPE},"*");},0);});})();</script></body>
