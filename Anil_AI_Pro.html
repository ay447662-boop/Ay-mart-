<!DOCTYPE html>
<html lang="hi">
<head><style>
@font-face {
  font-family: "Optimistic";
  font-style: normal;
  font-weight: 400 600;
  font-display: swap;
  src: url("/fonts/OptimisticAI_VF_Optimized.woff2") format("woff2");
}
@font-face {
  font-family: "Optimistic Mono";
  font-style: normal;
  font-weight: 400;
  font-display: swap;
  src: url("/fonts/OptimisticMono_W_TextRegular.woff2") format("woff2");
}
:where(html) {
  font-family: "Optimistic", system-ui, sans-serif;
}
:where(code, pre, kbd, samp) {
  font-family: "Optimistic Mono", ui-monospace, monospace;
}
</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anil AI Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:system-ui,-apple-system,sans-serif}
.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body class="bg-gray-50 h-screen flex flex-col">
<div class="bg-white shadow-sm p-4 flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-600 to-purple-600 flex items-center justify-center text-white font-bold">A</div>
<div><h1 class="font-semibold">Anil AI Pro</h1><p class="text-xs text-green-600">● Voice • Photo • Online</p></div>
</div>
<div id="chat" class="flex-1 overflow-y-auto p-4 space-y-3">
<div class="flex gap-2"><div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-xs">AI</div>
<div class="bg-white p-3 rounded-2xl shadow-sm max-w-[80%]">Namaste Anil! 🙏 Main Anil AI Pro hoon. Voice aur Photo dono se baat karo!</div></div>
</div>
<div id="preview" class="hidden px-4 pb-2"></div>
<div class="bg-white border-t p-3">
<div class="flex items-center gap-2 bg-gray-100 rounded-full px-3 py-2">
<input type="file" id="file" accept="image/*" capture="environment" class="hidden">
<button onclick="document.getElementById('file').click()" class="p-2">📷</button>
<input id="input" placeholder="Message Anil AI..." class="flex-1 bg-transparent outline-none px-2">
<button id="mic" class="p-2">🎤</button>
<button id="send" class="bg-blue-600 text-white rounded-full w-9 h-9">➤</button>
</div>
<div class="flex gap-2 mt-2 overflow-x-auto text-xs">
<button class="chip bg-gray-100 px-3 py-1 rounded-full whitespace-nowrap">Ay-Mart Post</button>
<button class="chip bg-gray-100 px-3 py-1 rounded-full whitespace-nowrap">Google Help</button>
</div>
</div>
<script>
const chat=document.getElementById('chat'),input=document.getElementById('input'),send=document.getElementById('send'),mic=document.getElementById('mic'),file=document.getElementById('file'),preview=document.getElementById('preview');
let imgData=null,rec,listen=false;

function addMsg(txt,who,img){
 const wrap=document.createElement('div');wrap.className='flex gap-2 '+(who==='user'?'justify-end':'');
 wrap.innerHTML=who==='user'?`<div class="bg-blue-600 text-white p-3 rounded-2xl max-w-[80%]">${img?`<img src="${img}" class="rounded-lg mb-2 max-h-40">`:''}${txt}</div>`:`<div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-xs">AI</div><div class="bg-white p-3 rounded-2xl shadow-sm max-w-[80%]">${txt} <button onclick="speak(this.parentNode.textContent)" class="ml-2 text-xs">🔊</button></div>`;
 chat.appendChild(wrap);chat.scrollTop=chat.scrollHeight;
}
function reply(q){
 q=q.toLowerCase();
 if(imgData) return "Wah Anil! Mast photo hai 📸 Isko Ay-Mart ke Google profile pe dal do, customer badhenge!";
 if(q.includes('ay-mart')||q.includes('post')) return "Ay-Mart ke liye 3 captions: 1) Panch Tulsi se immunity badhao! 🌿 Ajaygarh me available. 2) Ayurvedic Store - Open 24hrs! 3) Asli Ayurveda, sahi daam!";
 if(q.includes('google')||q.includes('address')) return "Address update ho gaya hai, Google ko 24hr lagte hain. Kal tak naya address dikhega!";
 return "Samajh gaya Anil! Main help karunga, bolo aur kya chahiye?";
}
send.onclick=()=>{const t=input.value.trim();if(!t&&!imgData)return;addMsg(t||'Photo bheji','user',imgData);input.value='';preview.innerHTML='';preview.classList.add('hidden');const r=imgData;imgData=null;setTimeout(()=>addMsg(reply(t),'ai'),600);};
input.onkeypress=e=>{if(e.key==='Enter')send.click()};
document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{input.value=c.textContent;input.focus()});
file.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{imgData=ev.target.result;preview.innerHTML=`<div class="relative inline-block"><img src="${imgData}" class="h-20 rounded-lg"><button onclick="imgData=null;this.parentElement.parentElement.classList.add('hidden')" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 text-xs">×</button></div>`;preview.classList.remove('hidden')};r.readAsDataURL(f)};
mic.onclick=()=>{
 if(!('webkitSpeechRecognition'in window||'SpeechRecognition'in window)){alert('Voice is phone me Chrome me chalega');return}
 if(!listen){rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();rec.lang='hi-IN';rec.onstart=()=>{listen=true;mic.classList.add('pulse','text-red-600');input.placeholder='Sun raha hoon...'};rec.onresult=e=>{input.value=e.results[0][0].transcript;send.click()};rec.onend=()=>{listen=false;mic.classList.remove('pulse','text-red-600');input.placeholder='Message Anil AI...'};rec.start()}else{rec.stop()}
};
function speak(t){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t.replace('🔊',''));u.lang='hi-IN';speechSynthesis.speak(u)}
</script>
<script>(function(){var loc=location.href.replace(/#.*$/,"");var ATTR_NAMES=["data-product-id","data-productid","data-product_id","product-id","productid","product_id","data-source-entity-id","source-entity-id","source_entity_id","data-product","data-metadata","data-meta"];var DATASET_KEYS=["productId","productid","product_id","sourceEntityId","sourceentityid","source_entity_id","product","metadata","meta"];function readProductId(value){if(typeof value!=="string"||value.length===0)return null;if(/^[0-9]{6,}$/.test(value))return value;var match=value.match(/(?:product(?:_|-)?id|source(?:_|-)?entity(?:_|-)?id)["'=:\s]+([0-9]{6,})/i);return match?match[1]:null}function extractProductId(start){for(var node=start;node&&node!==document.body;node=node.parentElement){for(var i=0;i<ATTR_NAMES.length;i++){var attrValue=node.getAttribute&&node.getAttribute(ATTR_NAMES[i]);var attrProductId=readProductId(attrValue);if(attrProductId)return attrProductId}var dataset=node.dataset||null;if(dataset){for(var j=0;j<DATASET_KEYS.length;j++){var dataValue=dataset[DATASET_KEYS[j]];var dataProductId=readProductId(dataValue);if(dataProductId)return dataProductId}}}return null}document.addEventListener("click",function(e){var target=e.target instanceof Element?e.target:null;if(!target)return;var a=target.closest?target.closest("a[href]"):null;if(!a||!a.href||!/^https?:\/\//.test(a.href))return;if(a.href.replace(/#.*$/,"")===loc)return;if(parent===window)return;var productId=extractProductId(target)||extractProductId(a);if(productId){e.preventDefault();parent.postMessage({type:"ecto-artifact-link-click",productId:productId},"*");return}e.preventDefault();parent.postMessage({type:"ecto:usercontent-link-click",href:a.href},"*")},true)})();</script><script>(function(){var FOCUS_TYPE="ecto:artifact-focus-request";var CLOSE_TYPE="ecto:artifact-close-request";function focusArtifactDocument(){var body=document.body;if(!body)return;try{window.focus();}catch(e){}if(!body.hasAttribute("tabindex"))body.setAttribute("tabindex","-1");try{body.focus({preventScroll:true});}catch(e){try{body.focus();}catch(e2){}}}window.addEventListener("message",function(event){if(event.source!==window.parent)return;var data=event.data;if(!data||typeof data!=="object"||data.type!==FOCUS_TYPE)return;if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",focusArtifactDocument,{once:true});return;}focusArtifactDocument();});window.addEventListener("keydown",function(event){if(event.key!=="Escape")return;window.setTimeout(function(){if(event.defaultPrevented)return;window.parent.postMessage({type:CLOSE_TYPE},"*");},0);});})();</script></body>
</html>
