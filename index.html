<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ay Mart 2050 - Final</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}body{font-family:Poppins;background:#0a0a0f;color:#fff;padding-bottom:70px}
.header{background:#131921;padding:10px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100;border-bottom:2px solid #00f5ff}
.logo{width:36px;height:36px;border-radius:8px;border:2px solid #00f5ff}
.brand{font-family:Orbitron;font-size:16px;background:linear-gradient(90deg,#00f5ff,#ff0080);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900}
.search-wrap{flex:1;display:flex;background:rgba(255,255,255,0.06);border:1px solid #00f5ff;border-radius:20px;overflow:hidden}
.search{flex:1;border:none;padding:8px 12px;background:transparent;color:#fff;outline:none;font-size:13px}
.voice-btn{background:#ff0080;border:none;padding:8px 10px;cursor:pointer}
.cart-icon{position:relative;font-size:24px;cursor:pointer}
.cart-count{position:absolute;top:-5px;right:-5px;background:#ff0080;color:#fff;border-radius:50%;width:17px;height:17px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:bold}
.banner{width:100%;height:140px;object-fit:cover}
.deal-box{background:#15151f;margin:8px;padding:10px;border-radius:10px;border:1px solid #00f5ff}
.deal-head{display:flex;justify-content:space-between}
.deal-title{color:#ff2a6d;font-family:Orbitron;font-size:14px;font-weight:bold}
.timer{background:#ff2a6d;color:#fff;padding:3px 7px;border-radius:4px;font-size:11px}
.cat-scroll{display:flex;gap:10px;padding:10px;overflow-x:auto;background:#15151f;margin:8px 0}
.cat-item{text-align:center;min-width:55px;cursor:pointer}
.cat-item img{width:45px;height:45px;border-radius:50%;border:2px solid rgba(0,245,255,0.3)}
.cat-item p{font-size:9px;margin-top:3px}
.visitor-bar{background:rgba(255,0,128,0.1);border:1px solid #ff0080;margin:8px;padding:7px;border-radius:6px;text-align:center;font-size:11px;color:#ff6b9d}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:8px}
.card{background:#15151f;border-radius:10px;overflow:hidden;border:1px solid rgba(0,245,255,0.2)}
.card img{width:100%;height:150px;object-fit:cover}
.info{padding:8px}
.name{font-size:11px;height:28px;overflow:hidden;margin-bottom:4px}
.price{font-size:16px;color:#00f5ff;font-weight:bold}
.mrp{font-size:10px;color:#777;text-decoration:line-through;margin-left:4px}
.off{font-size:9px;color:#ff2a6d;background:rgba(255,0,128,0.2);padding:1px 4px;border-radius:3px;margin-left:4px}
.stock{color:#ff2a6d;font-size:10px;font-weight:bold;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
.delivery{font-size:10px;color:#0f0;margin:3px 0}
.btn{background:linear-gradient(90deg,#00f5ff,#00d4ff);color:#000;border:none;padding:7px;border-radius:15px;font-size:10px;font-weight:bold;width:100%;margin-top:4px;cursor:pointer}
.btn-buy{background:linear-gradient(90deg,#ff0080,#ff4da6);color:#fff}
.wa-float{position:fixed;bottom:75px;right:12px;width:50px;height:50px;background:#25d366;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:99;cursor:pointer}
.wa-float img{width:28px}
.chat-bot{position:fixed;bottom:135px;right:12px;width:50px;height:50px;background:linear-gradient(135deg,#00f5ff,#ff0080);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;z-index:98}
.chat-window{display:none;position:fixed;bottom:195px;right:12px;width:280px;height:320px;background:#15151f;border:2px solid #00f5ff;border-radius:10px;z-index:97}
.chat-head{background:linear-gradient(90deg,#00f5ff,#ff0080);padding:8px;font-weight:bold;color:#000;text-align:center;font-size:13px}
.chat-body{padding:8px;height:230px;overflow-y:auto;font-size:11px}
.chat-msg{background:rgba(0,245,255,0.1);padding:6px;border-radius:5px;margin-bottom:5px;border-left:2px solid #00f5ff}
.chat-input{display:flex;padding:6px}
.chat-input input{flex:1;background:rgba(255,255,255,0.05);border:1px solid #00f5ff;padding:5px;border-radius:12px;color:#fff;font-size:11px}
.footer{position:fixed;bottom:0;left:0;right:0;background:#131921;display:flex;border-top:2px solid #00f5ff}
.f-item{flex:1;text-align:center;padding:7px 3px;color:#888;font-size:9px;cursor:pointer}
.f-item.active{color:#00f5ff}
.review-box{background:#15151f;margin:8px;padding:10px;border-radius:10px}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<div class="header">
  <img src="https://i.ibb.co/7jQJ7vL/logo-ay-mart.png" class="logo">
  <div class="brand">AY MART</div>
  <div class="search-wrap">
    <input class="search" id="srch" placeholder="Search...">
    <button class="voice-btn" onclick="voiceSearch()">🎤</button>
  </div>
  <div class="cart-icon" onclick="openCart()">🛒<span class="cart-count" id="cartCount">0</span></div>
</div>

<img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=800" class="banner">

<div class="deal-box">
  <div class="deal-head">
    <div class="deal-title">⚡ DEAL</div>
    <div class="timer" id="timer">04:51:32</div>
  </div>
</div>

<div class="cat-scroll">
  <div class="cat-item" onclick="showAll()"><img src="https://cdn-icons-png.flaticon.com/512/2331/2331966.png"><p>All</p></div>
  <div class="cat-item" onclick="filterCat('kurta')"><img src="https://images.unsplash.com/photo-1585487000160-6ebcfceb0d03?w=100"><p>Kurta</p></div>
  <div class="cat-item" onclick="filterCat('shirt')"><img src="https://images.unsplash.com/photo-1596755094514-f87e34085b2c?w=100"><p>Shirt</p></div>
  <div class="cat-item" onclick="spin()"><img src="https://cdn-icons-png.flaticon.com/512/833/833314.png"><p>Spin</p></div>
</div>

<div class="visitor-bar" id="visitorBar">🔥 17 log dekh rahe hain</div>

<div class="grid" id="grid"></div>

<div class="review-box">
  <div style="font-weight:bold;font-size:13px;margin-bottom:6px">⭐ Reviews</div>
  <div id="reviews"></div>
</div>

<div class="wa-float" onclick="window.open('https://wa.me/918770840326')">
  <img src="https://cdn-icons-png.flaticon.com/512/3670/3670051.png">
</div>

<div class="chat-bot" onclick="toggleChat()">💬</div>
<div class="chat-window" id="chatWin">
  <div class="chat-head">AY MART AI</div>
  <div class="chat-body" id="chatBody"><div class="chat-msg">Namaste! Kya chahiye?</div></div>
  <div class="chat-input"><input id="chatInp" placeholder="Type..." onkeypress="if(event.key=='Enter')sendChat()"></div>
</div>

<div class="footer">
  <div class="f-item active">🏠<br>Home</div>
  <div class="f-item" onclick="showAll()">📦<br>Shop</div>
  <div class="f-item" onclick="openCart()">🛒<br>Cart</div>
  <div class="f-item" onclick="window.open('https://wa.me/918770840326')">💬<br>Help</div>
  <div class="f-item" onclick="adminPanel()">🔐<br>Admin</div>
</div>

<script>
// === DATA ===
const DEFAULT_PRODUCTS = [
  {id:1,name:'Premium Kurta Black',price:999,mrp:2297,rating:4.9,reviews:797,img:'https://images.unsplash.com/photo-1585487000160-6ebcfceb0d03?w=400',cat:'kurta',stock:2},
  {id:2,name:'Formal Shirt White',price:599,mrp:1499,rating:4.8,reviews:456,img:'https://images.unsplash.com/photo-1596755094514-f87e34085b2c?w=400',cat:'shirt',stock:5},
  {id:3,name:'Casual T-Shirt',price:299,mrp:799,rating:4.3,reviews:189,img:'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400',cat:'shirt',stock:8},
  {id:4,name:'Maroon Kurta',price:699,mrp:1799,rating:4.9,reviews:678,img:'https://images.unsplash.com/photo-1618354691373-d851c5c3a990?w=400',cat:'kurta',stock:3}
];

let PRODUCTS = JSON.parse(localStorage.getItem('ay_products')) || DEFAULT_PRODUCTS;
let CART = JSON.parse(localStorage.getItem('ay_cart')) || [];

// === RENDER ===
function render(list=PRODUCTS){
  grid.innerHTML = list.map(p=>{
    let off = Math.round((p.mrp-p.price)/p.mrp*100);
    let stock = p.stock<4? `<div class="stock">Only ${p.stock} Left!</div>` : '';
    return `<div class="card">
      <img src="${p.img}">
      <div class="info">
        <div class="name">${p.name}</div>
        <div><span class="price">₹${p.price}</span><span class="mrp">₹${p.mrp}</span><span class="off">${off}%</span></div>
        ${stock}
        <div class="delivery">FREE Delivery</div>
        <button class="btn" onclick="addToCart(${p.id})">ADD CART</button>
        <button class="btn btn-buy" onclick="buyNow('${p.name}',${p.price},${p.mrp})">BUY NOW</button>
      </div>
    </div>`;
  }).join('');
}

function addToCart(id){
  let p = PRODUCTS.find(x=>x.id===id);
  let c = CART.find(x=>x.id===id);
  if(c) c.qty++; else CART.push({...p,qty:1});
  localStorage.setItem('ay_cart',JSON.stringify(CART));
  updateCart();
  alert('Added!');
}

function updateCart(){
  cartCount.textContent = CART.reduce((a,b)=>a+b.qty,0);
}

function buyNow(name,price,mrp){
  const id = 'AY' + Date.now().toString().slice(-6);
  const customer = prompt('Aapka Naam:'); if(!customer) return;
  const phone = prompt('Mobile:'); if(!phone) return;
  const address = prompt('Address:'); if(!address) return;

  // stock update
  let prod = PRODUCTS.find(p=>p.name===name);
  if(prod && prod.stock>0){ prod.stock--; localStorage.setItem('ay_products',JSON.stringify(PRODUCTS)); render(); }

  // PDF
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(18); doc.text('AY MART 2050',105,20,{align:'center'});
  doc.setFontSize(12); doc.text(`Order: ${id}`,20,35); doc.text(`Date: ${new Date().toLocaleDateString('en-IN')}`,20,43);
  doc.text(`Name: ${customer}`,20,55); doc.text(`Phone: ${phone}`,20,63); doc.text(`Address: ${address}`,20,71);
  doc.autoTable({startY:80, head:[['Item','Price']], body:[[name,`Rs ${price}`]]});
  doc.text(`Total: Rs ${price} COD`,20,doc.lastAutoTable.finalY+10);
  doc.save(`Invoice-${id}.pdf`);

  // WhatsApp
  const msg = `⚡ ORDER ${id}%0A${name} - ₹${price}%0A%0A${customer}%0A${phone}%0A${address}`;
  window.open(`https://wa.me/918770840326?text=${msg}`,'_blank');
}

function openCart(){
  if(CART.length===0){ alert('Cart empty'); return; }
  let total = CART.reduce((a,b)=>a+b.price*b.qty,0);
  let items = CART.map(x=>`${x.name} x${x.qty}`).join('%0A');
  window.open(`https://wa.me/918770840326?text=Cart:%0A${items}%0A%0ATotal: ₹${total}`,'_blank');
}

function showAll(){ render(PRODUCTS); }
function filterCat(cat){ render(PRODUCTS.filter(p=>p.cat===cat)); }

function voiceSearch(){
  if(!('webkitSpeechRecognition' in window)){ alert('Voice not supported'); return; }
  let r = new webkitSpeechRecognition(); r.lang='hi-IN'; r.start();
  r.onresult = e => { srch.value = e.results[0][0].transcript; srch.dispatchEvent(new Event('input')); };
}

srch.oninput = e => {
  let v = e.target.value.toLowerCase();
  render(PRODUCTS.filter(p=>p.name.toLowerCase().includes(v)));
};

function spin(){ alert('🎉 You won ₹100 OFF! Code: AY100'); }
function toggleChat(){ chatWin.style.display = chatWin.style.display==='block'?'none':'block'; }
function sendChat(){
  let m = chatInp.value; if(!m) return;
  chatBody.innerHTML += `<div class="chat-msg" style="text-align:right">${m}</div>`;
  chatInp.value='';
  setTimeout(()=>{ chatBody.innerHTML += `<div class="chat-msg">₹${299+Math.floor(Math.random()*300)} me milega. Buy karo!</div>`; },600);
}

function adminPanel(){
  let pass = prompt('Password:');
  if(pass!=='AyMart2050'){ if(pass) alert('Wrong'); return; }
  let n = prompt('Product name:'); if(!n) return;
  let p = Number(prompt('Price:')); let m = Number(prompt('MRP:'));
  let img = prompt('Image URL:') || 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400';
  let s = Number(prompt('Stock:')) || 5;
  PRODUCTS.push({id:Date.now(),name:n,price:p,mrp:m,rating:4.5,reviews:0,img,cat:'shirt',stock:s});
  localStorage.setItem('ay_products',JSON.stringify(PRODUCTS));
  render(); alert('Added!');
}

// Init
reviews.innerHTML = [
  {n:'Rohit',t:'Best quality, 2 din delivery'},
  {n:'Priya',t:'Price kam, COD best'},
  {n:'Amit',t:'WhatsApp order easy'}
].map(r=>`<div style="display:flex;gap:6px;margin-bottom:6px"><div style="width:24px;height:24px;border-radius:50%;background:#00f5ff;color:#000;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold">${r.n[0]}</div><div style="font-size:11px"><b>${r.n}</b><br><span style="color:#aaa">${r.t}</span></div></div>`).join('');

setInterval(()=>{ timer.textContent = `Ends in 04:${String(Math.floor(Math.random()*60)).padStart(2,'0')}:${String(Math.floor(Math.random()*60)).padStart(2,'0')}`; },1000);
setInterval(()=>{ visitorBar.textContent = `🔥 ${15+Math.floor(Math.random()*8)} log dekh rahe`; },3000);

render(); updateCart();
</script>
</body>
</html>
