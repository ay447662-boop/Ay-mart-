let CART = JSON.parse(localStorage.getItem('ay_cart')) || [];
let ORDERS = JSON.parse(localStorage.getItem('ay_orders')) || [];
let currentProduct = null;

function render(list=PRODUCTS){
  const grid = document.getElementById('grid');
  grid.innerHTML = list.map(p=>{
    let off = Math.round((p.mrp-p.price)/p.mrp*100);
    let stock = p.stock<5? `<div class="stock">Only ${p.stock} Left!</div>` : '';
    return `<div class="card"><img src="${p.img}"><div class="info"><div class="name">${p.name}</div><div><span class="price">₹${p.price}</span><span class="mrp">₹${p.mrp}</span><span class="off">${off}%</span></div>${stock}<div class="delivery">🚚 Asort Shipping</div><button class="btn" onclick="addToCart(${p.id})">ADD CART</button><button class="btn btn-buy" onclick="openBooking(${p.id})">BOOK NOW</button></div></div>`;
  }).join('');
}

function addToCart(id){
  let p=PRODUCTS.find(x=>x.id===id);
  let c=CART.find(x=>x.id===id);
  if(c)c.qty++;else CART.push({...p,qty:1});
  localStorage.setItem('ay_cart',JSON.stringify(CART));
  updateCart();
  alert('Added to cart!');
}

function updateCart(){
  document.getElementById('cartCount').textContent=CART.reduce((a,b)=>a+b.qty,0);
}

function openBooking(id){
  currentProduct = PRODUCTS.find(x=>x.id===id);
  document.getElementById('bookProduct').innerHTML = `<b>${currentProduct.name}</b> - ₹${currentProduct.price}`;
  document.getElementById('bookingModal').style.display='flex';
}

function closeModal(){
  document.getElementById('bookingModal').style.display='none';
  currentProduct = null;
}

function confirmBooking(){
  const name = document.getElementById('custName').value;
  const phone = document.getElementById('custPhone').value;
  const address = document.getElementById('custAddress').value;
  const city = document.getElementById('custCity').value;
  
  if(!name || !phone || !address){
    alert('Please fill all required fields!');
    return;
  }
  
  const orderId = 'ASORT' + Date.now().toString().slice(-8);
  const order = {
    id: orderId,
    date: new Date().toLocaleString('en-IN'),
    product: currentProduct.name,
    price: currentProduct.price,
    customer: name,
    phone: phone,
    address: address,
    city: city,
    status: 'Booked - Asort Shipping',
    asortAWB: 'AS' + Math.floor(Math.random()*1000000)
  };
  
  ORDERS.push(order);
  localStorage.setItem('ay_orders', JSON.stringify(ORDERS));
  
  // Generate PDF
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(18);doc.text('AY MART 2050 - ASORT SHIPPING',105,20,{align:'center'});
  doc.setFontSize(10);doc.text('Ajaygarh, MP | +91 8770840326',105,28,{align:'center'});
  doc.setFontSize(12);doc.text(`Order ID: ${orderId}`,20,40);
  doc.text(`Asort AWB: ${order.asortAWB}`,20,48);
  doc.text(`Date: ${order.date}`,20,56);
  doc.text(`Customer: ${name}`,20,68);doc.text(`Phone: ${phone}`,20,76);doc.text(`Address: ${address}, ${city}`,20,84);
  doc.autoTable({startY:95,head:[['Product','Price','Status']],body:[[currentProduct.name,`Rs ${currentProduct.price}`,'Booked - Asort']]});
  doc.text(`Total: Rs ${currentProduct.price} | COD Available`,20,doc.lastAutoTable.finalY+10);
  doc.text('Your order will be shipped via Asort within 24 hours',20,doc.lastAutoTable.finalY+20);
  doc.save(`Asort-Order-${orderId}.pdf`);
  
  // WhatsApp to you + Customer
  const msg=`🚚 ASORT BOOKING CONFIRMED 🚚%0A%0AOrder ID: ${orderId}%0AAsort AWB: ${order.asortAWB}%0A%0AProduct: ${currentProduct.name}%0APrice: ₹${currentProduct.price}%0A%0ACustomer: ${name}%0APhone: ${phone}%0AAddress: ${address}, ${city}%0A%0A✅ Booked for Asort Shipping%0A📦 Dispatch in 24 hours%0A💰 COD Available`;
  window.open(`https://wa.me/918770840326?text=${msg}`,'_blank');
  
  closeModal();
  alert(`✅ ORDER BOOKED!\n\nOrder ID: ${orderId}\nAsort AWB: ${order.asortAWB}\n\nSaman Asort me book ho gaya!\n24 hours me dispatch hoga.\nPDF download ho gayi.`);
  
  // Clear form
  document.getElementById('custName').value='';
  document.getElementById('custPhone').value='';
  document.getElementById('custAddress').value='';
}

function openCart(){
  if(CART.length===0){alert('Cart empty');return;}
  let total=CART.reduce((a,b)=>a+b.price*b.qty,0);
  let items=CART.map(x=>`${x.name} x${x.qty}`).join('%0A');
  window.open(`https://wa.me/918770840326?text=Ajaygarh Cart:%0A${items}%0A%0ATotal: ₹${total}`,'_blank');
}

function showOrders(){
  if(ORDERS.length===0){alert('No orders yet');return;}
  let orderList = ORDERS.slice(-5).reverse().map(o=>`${o.id} - ${o.product} - ₹${o.price} - ${o.status}`).join('\n\n');
  alert(`📋 LAST 5 ORDERS:\n\n${orderList}`);
}

function showAll(){render(PRODUCTS);}
function filterCat(cat){render(PRODUCTS.filter(p=>p.cat===cat));}
function voiceSearch(){if(!('webkitSpeechRecognition'in window)){alert('Voice not supported');return;}let r=new webkitSpeechRecognition();r.lang='hi-IN';r.start();r.onresult=e=>{document.getElementById('srch').value=e.results[0][0].transcript;document.getElementById('srch').dispatchEvent(new Event('input'));}}
document.getElementById('srch').oninput=e=>{let v=e.target.value.toLowerCase();render(PRODUCTS.filter(p=>p.name.toLowerCase().includes(v)));};
