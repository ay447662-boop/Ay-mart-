<style>
body{font-family:Arial;background:#0a0a0f;color:#fff;margin:0;padding-bottom:70px}
.header{background:#131921;padding:10px;display:flex;align-items:center;gap:8px;border-bottom:2px solid #00f5ff}
.brand{font-size:16px;font-weight:bold;color:#00f5ff}
.search-wrap{flex:1;display:flex;background:#222;border:1px solid #00f5ff;border-radius:20px;overflow:hidden}
.search{flex:1;border:none;padding:8px 12px;background:transparent;color:#fff;outline:none;font-size:13px}
.cart-icon{position:relative;font-size:24px}
.cart-count{position:absolute;top:-5px;right:-5px;background:#ff0080;color:#fff;border-radius:50%;width:17px;height:17px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:bold}
.banner{width:100%;height:140px;object-fit:cover}
.cat-scroll{display:flex;gap:10px;padding:10px;overflow-x:auto;background:#15151f;margin:8px 0}
.cat-item{text-align:center;min-width:55px;cursor:pointer}
.cat-item img{width:45px;height:45px;border-radius:50%;border:2px solid #00f5ff}
.cat-item p{font-size:9px;margin-top:3px}
.visitor-bar{background:rgba(255,0,128,0.1);border:1px solid #ff0080;margin:8px;padding:7px;border-radius:6px;text-align:center;font-size:11px;color:#ff6b9d}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:8px}
.card{background:#15151f;border-radius:10px;overflow:hidden;border:1px solid #00f5ff}
.card img{width:100%;height:150px;object-fit:cover}
.info{padding:8px}
.name{font-size:11px;height:28px;overflow:hidden;margin-bottom:4px}
.price{font-size:16px;color:#00f5ff;font-weight:bold}
.mrp{font-size:10px;color:#777;text-decoration:line-through;margin-left:4px}
.delivery{font-size:10px;color:#0f0;margin:3px 0}
.btn{background:#00f5ff;color:#000;border:none;padding:7px;border-radius:15px;font-size:10px;font-weight:bold;width:100%;margin-top:4px;cursor:pointer}
.btn-buy{background:#ff0080;color:#fff}
.footer{position:fixed;bottom:0;left:0;right:0;background:#131921;display:flex;border-top:2px solid #00f5ff}
.f-item{flex:1;text-align:center;padding:7px 3px;color:#888;font-size:9px;cursor:pointer}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:999;align-items:center;justify-content:center}
.modal-box{background:#15151f;border:2px solid #00f5ff;border-radius:10px;padding:15px;width:90%;max-width:400px;position:relative}
.modal-box h3{color:#00f5ff;margin-bottom:10px;text-align:center}
.modal-box input,.modal-box textarea{width:100%;background:#222;border:1px solid #00f5ff;padding:8px;border-radius:5px;color:#fff;margin-bottom:8px;font-size:12px}
.modal-box button{background:#ff0080;color:#fff;border:none;padding:10px;border-radius:5px;width:100%;font-weight:bold;cursor:pointer}
.close-btn{position:absolute;top:10px;right:15px;font-size:24px;cursor:pointer;color:#ff0080}
</style>

var CART = [];
var ORDERS = [];
var currentProduct = null;

function render(list){
  if(!list) list = PRODUCTS;
  var grid = document.getElementById('grid');
  var html = '';
  for(var i=0;i<list.length;i++){
    var p = list[i];
    html += '<div class="card"><img src="'+p.img+'"><div class="info"><div class="name">'+p.name+'</div><div><span class="price">₹'+p.price+'</span><span class="mrp">₹'+p.mrp+'</span></div><div class="delivery">🚚 Asort Shipping</div><button class="btn" onclick="addToCart('+p.id+')">ADD CART</button><button class="btn btn-buy" onclick="openBooking('+p.id+')">BOOK NOW</button></div></div>';
  }
  grid.innerHTML = html;
}

function addToCart(id){
  var p=null;for(var i=0;i<PRODUCTS.length;i++){if(PRODUCTS[i].id==id){p=PRODUCTS[i];break;}}
  var c=null;for(var i=0;i<CART.length;i++){if(CART[i].id==id){c=CART[i];break;}}
  if(c)c.qty++;else CART.push({id:p.id,name:p.name,price:p.price,qty:1});
  updateCart();
  alert('Added to cart!');
}

function updateCart(){
  var total=0;for(var i=0;i<CART.length;i++){total+=CART[i].qty;}
  document.getElementById('cartCount').textContent=total;
}

function openBooking(id){
  for(var i=0;i<PRODUCTS.length;i++){if(PRODUCTS[i].id==id){currentProduct=PRODUCTS[i];break;}}
  document.getElementById('bookProduct').innerHTML = '<b>'+currentProduct.name+'</b> - ₹'+currentProduct.price;
  document.getElementById('bookingModal').style.display='flex';
}

function closeModal(){
  document.getElementById('bookingModal').style.display='none';
  currentProduct = null;
}

function confirmBooking(){
  var name = document.getElementById('custName').value;
  var phone = document.getElementById('custPhone').value;
  var address = document.getElementById('custAddress').value;
  var city = document.getElementById('custCity').value;
  if(!name||!phone||!address){alert('Please fill all fields!');return;}

  var orderId = 'ASORT' + Date.now().toString().slice(-8);
  var asortAWB = 'AS' + Math.floor(Math.random()*1000000);

  ORDERS.push({id:orderId,product:currentProduct.name,price:currentProduct.price,customer:name,phone:phone,address:address,city:city,asortAWB:asortAWB});

  var msg='🚚 ASORT BOOKING%0A%0AOrder ID: '+orderId+'%0AAWB: '+asortAWB+'%0A%0AProduct: '+currentProduct.name+'%0APrice: ₹'+currentProduct.price+'%0A%0ACustomer: '+name+'%0APhone: '+phone+'%0AAddress: '+address+', '+city+'%0A%0A✅ Booked for Asort';
  window.open('https://wa.me/918770840326?text='+msg,'_blank');

  closeModal();
  alert('✅ ORDER BOOKED!\n\nOrder ID: '+orderId+'\nAsort AWB: '+asortAWB+'\n\nSaman Asort me book ho gaya!');

  document.getElementById('custName').value='';
  document.getElementById('custPhone').value='';
  document.getElementById('custAddress').value='';
}

function openCart(){
  if(CART.length==0){alert('Cart empty');return;}
  var total=0;for(var i=0;i<CART.length;i++){total+=CART[i].price*CART[i].qty;}
  var items='';for(var i=0;i<CART.length;i++){items+=CART[i].name+' x'+CART[i].qty+'%0A';}
  window.open('https://wa.me/918770840326?text=Cart:%0A'+items+'%0A%0ATotal: ₹'+total,'_blank');
}

function showOrders(){
  if(ORDERS.length==0){alert('No orders yet');return;}
  var orderList='';for(var i=ORDERS.length-1;i>=0&&i>=ORDERS.length-5;i--){var o=ORDERS[i];orderList+=o.id+' - '+o.product+' - ₹'+o.price+'\n\n';}
  alert('📋 LAST 5 ORDERS:\n\n'+orderList);
}

function showAll(){render(PRODUCTS);}
function filterCat(cat){var filtered=[];for(var i=0;i<PRODUCTS.length;i++){if(PRODUCTS[i].cat==cat)filtered.push(PRODUCTS[i]);}render(filtered);}
document.getElementById('srch').oninput=function(e){var v=e.target.value.toLowerCase();var filtered=[];for(var i=0;i<PRODUCTS.length;i++){if(PRODUCTS[i].name.toLowerCase().indexOf(v)>-1)filtered.push(PRODUCTS[i]);}render(filtered);};
function spin(){alert('🎉 ₹100 OFF! Code: AJAY100');}
function adminPanel(){var p=prompt('Admin Password:');if(p!=='AyMart2050'){if(p)alert('Wrong');return;}var totalOrders=ORDERS.length;var totalRevenue=0;for(var i=0;i<ORDERS.length;i++){totalRevenue+=ORDERS[i].price;}alert('📊 ADMIN\nTotal Orders: '+totalOrders+'\nRevenue: ₹'+totalRevenue);}
