</body><!DOCTYPE html>
<html>
<head>
    <title>Ay-Mart</title>
    <style>
        .shop-container { padding: 20px; font-family: Arial, sans-serif; }
        .shop-container h2 { text-align: center; color: #333; }
        .product-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 20px; }
        .product-card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; width: 200px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .product-card img { width: 100%; border-radius: 5px; }
        .product-card h3 { font-size: 18px; margin: 10px 0 5px 0; }
        .price { color: green; font-weight: bold; font-size: 16px; }
        .buy-btn { background-color: #ff6b00; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; width: 100%; }
        .buy-btn:hover { background-color: #e55f00; }
    </style>
</head>
<body>
    <h1>Welcome to Ay-Mart</h1>
    <p>Ye meri pehli website hai</p>
    <p>GitHub Pages se bani hai</p>

    <div class="shop-container">
        <h2>Our Products</h2>
        <div class="product-grid">
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="T-Shirt">
                <h3>Cool T-Shirt</h3>
                <p class="price">₹399</p>
                <button class="buy-btn">Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Shoes">
                <h3>Sports Shoes</h3>
                <p class="price">₹999</p>
                <button class="buy-btn">Add to Cart</button>
            </div>
        </div>
    </div>

</body>
</html>
</html>
