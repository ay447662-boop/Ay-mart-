<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}body{font-family:Poppins;background:#0a0a0f;color:#fff;padding-bottom:70px}
.header{background:#131921;padding:10px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100;border-bottom:2px solid #00f5ff}
.brand{font-family:Orbitron;font-size:16px;background:linear-gradient(90deg,#00f5ff,#ff0080);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900}
.search-wrap{flex:1;display:flex;background:#222;border:1px solid #00f5ff;border-radius:20px;overflow:hidden}
.search{flex:1;border:none;padding:8px 12px;background:transparent;color:#fff;outline:none;font-size:13px}
.cart-icon{position:relative;font-size:24px;cursor:pointer}
.cart-count{position:absolute;top:-5px;right:-5px;background:#ff0080;color:#fff;border-radius:50%;width:17px;height:17px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:bold}
.banner{width:100%;height:140px;object-fit:cover}
.cat-scroll{display:flex;gap:10px;padding:10px;overflow-x:auto;background:#15151f;margin:8px 0}
.cat-item{text-align:center;min-width:55px;cursor:pointer}
.cat-item img{width:45px;height:45px;border-radius:50%;border:2px solid #00f5ff}
.cat-item p{font-size:9px;margin-top:3px}
.visitor-bar{background:rgba(255,0,128,0.1);border:1px solid #ff0080;margin:8px;padding:7px;border-radius:6px;text-align:center;font-size:11px;color:#ff6b9d}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:8px}
.card{background:#15151f;border-radius:10px;overflow:hidden;border:1px solid #00f5ff}
.card img{width:100%;height:150px;object-fit:cover}
.info{padding:8px}
.name{font-size:11px;height:28px;overflow:hidden;margin-bottom:4px}
.price{font-size:16px;color:#00f5ff;font-weight:bold}
.mrp{font-size:10px;color:#777;text-decoration:line-through;margin-left:4px}
.stock{color:#ff2a6d;font-size:10px;font-weight:bold}
.delivery{font-size:10px;color:#0f0;margin:3px 0}
.btn{background:#00f5ff;color:#000;border:none;padding:7px;border-radius:15px;font-size:10px;font-weight:bold;width:100%;margin-top:4px;cursor:pointer}
.btn-buy{background:#ff0080;color:#fff}
.footer{position:fixed;bottom:0;left:0;right:0;background:#131921;display:flex;border-top:2px solid #00f5ff}
.f-item{flex:1;text-align:center;padding:7px 3px;color:#888;font-size:9px;cursor:pointer}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:999;align-items:center;justify-content:center;overflow-y:auto;padding:20px 0}
.modal-box{background:#15151f;border:2px solid #00f5ff;border-radius:10px;padding:15px;width:90%;max-width:400px;position:relative;margin:auto}
.modal-box h3{color:#00f5ff;margin-bottom:10px;text-align:center}
.modal-box input,.modal-box textarea,.modal-box select{width:100%;background:#222;border:1px solid #00f5ff;padding:8px;border-radius:5px;color:#fff;margin-bottom:8px;font-size:12px}
.modal-box button{background:#ff0080;color:#fff;border:none;padding:10px;border-radius:5px;width:100%;font-weight:bold;cursor:pointer;margin-top:5px}
.close-btn{position:absolute;top:10px;right:15px;font-size:24px;cursor:pointer;color:#ff0080}
.order-list{max-height:300px;overflow-y:auto;font-size:11px}
.order-item{background:rgba(0,245,255,0.1);padding:8px;border-radius:5px;margin-bottom:8px;border-left:2px solid #00f5ff}
.track-box{background:rgba(0,245,255,0.1);padding:10px;border-radius:5px;margin:10px 0;border:1px solid #00f5ff}
</style>

var CART = [];
var ORDERS = JSON.parse(localStorage.getItem('ay_orders')) || [];
var currentProduct = null;

function render(list){
  if(!list) list = PRODUCTS;
  var grid = document.getElementById('grid');
  var html = '';
  for(var i=0;i<list.length;i++){
    var p = list[i];
    var stockTxt = p.stock>0? (p.stock<5?'<div class="stock">Only '+p.stock+' Left!</div>':'') : '<div class="stock">Out of Stock</div>';
    var btnDisabled = p.stock>0? '' : 'disabled style="opacity:0.5"';
    html += '<div class="card"><img src="'+p.img+'"><div class="info"><div class="name">'+p.name+'</div><div><span class="price">₹'+p.price+'</span><span class="mrp">₹'+p.mrp+'</span></div>'+stockTxt+'<div class="delivery">🚚 Asort Shipping</div><button class="btn" onclick="addToCart('+p.id+')" '+btnDisabled+'>ADD CART</button><button class="btn btn-buy" onclick="openBooking('+p.id+')" '+btnDisabled+'>BOOK NOW</button></div></div>';
  }
  grid.innerHTML = html;
}

function addToCart(id){
  var p=null;for(var i=0;i<PRODUCTS.length;i++){if(PRODUCTS[i].id==id){p=PRODUCTS[i];break;}}
  if(p.stock==0){alert('Out of Stock!');return;}
  var c=null;for(var i=0;i<CART.length;i++){if(CART[i].id==id){c=CART[i];break;}}
  if(c)c.qty++;else CART.push({id:p.id,name:p.name,price:p.price,qty:1});
  updateCart();
  alert('Added to cart!');
}

function updateCart(){
  var total=0;for(var i=0;i<CART.length;i++){total+=CART[i].qty;}
  document.getElementById('cartCount').textContent=total;
}

function openBooking(id){
  for(var i=0;i<PRODUCTS.length;i++){if(PRODUCTS[i].id==id){currentProduct=PRODUCTS[i];break;}}
  if(currentProduct.stock==0){alert('Out of Stock!');return;}
  document.getElementById('bookProduct').innerHTML = '<b>'+currentProduct.name+'</b> - ₹'+currentProduct.price+' | Stock: '+currentProduct.stock;
  document.getElementById('bookingModal').style.display='flex';
}

function closeModal(){document.getElementById('bookingModal').style.display='none';currentProduct=null;}

function confirmBooking(){
  var name = document.getElementById('custName').value;
  var phone = document.getElementById('custPhone').value;
  var address = document.getElementById('custAddress').value;
  var city = document.getElementById('custCity').value;
  var payMethod = document.getElementById('payMethod').value;
  
  if(!name||!phone||!address){alert('Please fill all fields!');return;}
  if(currentProduct.stock==0){alert('Sorry, Out of Stock!');closeModal();return;}

  var orderId = 'ASORT' + Date.now().toString().slice(-8);
  var asortAWB = 'AS' + Math.floor(Math.random()*10000000);
  
  for(var i=0;i<PRODUCTS.length;i++){
    if(PRODUCTS[i].id==currentProduct.id){
      PRODUCTS[i].stock--;
      break;
    }
  }
  
  var order = {
    id: orderId,
    date: new Date().toLocaleString('en-IN'),
    product: currentProduct.name,
    productId: currentProduct.id,
    price: currentProduct.price,
    customer: name,
    phone: phone,
    address: address,
    city: city,
    payment: payMethod,
    status: payMethod=='COD'?'Booked - COD':'Payment Pending',
    asortAWB: asortAWB,
    tracking: ['Order Placed','Asort Pickup Scheduled']
  };

  if(payMethod=='ONLINE'){
    var options = {
      "key": CONFIG.RAZORPAY_KEY,
      "amount": currentProduct.price*100,
      "currency": "INR",
      "name": "Ay Mart 2050",
      "description": currentProduct.name,
      "handler": function(response){
        order.status = 'Paid - Asort Shipping';
        order.paymentId = response.razorpay_payment_id;
        order.tracking.push('Payment Success - '+response.razorpay_payment_id);
        processOrder(order);
      },
      "prefill": {"name":name,"contact":phone},
      "theme": {"color": "#00f5ff"}
    };
    var rzp = new Razorpay(options);
    rzp.open();
  } else {
    processOrder(order);
  }
}

function processOrder(order){
  ORDERS.push(order);
  localStorage.setItem('ay_orders', JSON.stringify(ORDERS));
  generatePDF(order);
  sendSMS(order);
  asortAPI(order);
  var msg='🚚 ASORT BOOKING%0A%0AOrder: '+order.id+'%0AAWB: '+order.asortAWB+'%0A%0AProduct: '+order.product+'%0APrice: ₹'+order.price+'%0APayment: '+order.payment+'%0A%0ACustomer: '+order.customer+'%0APhone: '+order.phone+'%0AAddress: '+order.address+', '+order.city;
  window.open('https://wa.me/'+CONFIG.WHATSAPP_NUMBER+'?text='+msg,'_blank');
  closeModal();
  render();
  alert('✅ ORDER BOOKED!\n\nOrder ID: '+order.id+'\nAWB: '+order.asortAWB+'\n\nPDF Downloaded\nSMS Sent\nAsort API Called');
  document.getElementById('custName').value='';
  document.getElementById('custPhone').value='';
  document.getElementById('custAddress').value='';
}

function generatePDF(order){
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF();
  doc.setFontSize(18);doc.text('AY MART 2050 - INVOICE',105,20,{align:'center'});
  doc.setFontSize(10);doc.text('Asort Shipping | Ajaygarh, MP | +91'+CONFIG.WHATSAPP_NUMBER,105,28,{align:'center'});
  doc.setFontSize(12);doc.text('Order ID: '+order.id,20,40);
  doc.text('Asort AWB: '+order.asortAWB,20,48);
  doc.text('Date: '+order.date,20,56);
  doc.text('Customer: '+order.customer,20,68);
  doc.text('Phone: '+order.phone,20,76);
