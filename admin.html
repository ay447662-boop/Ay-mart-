<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ay Mart Admin</title>
<style>
body{font-family:Arial;background:#f1f3f6;padding:15px;margin:0}
.box{max-width:450px;margin:20px auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 1px 5px rgba(0,0,0,0.2)}
h2{color:#2874f0;text-align:center;margin:0 0 15px 0}
input,select,button{width:100%;padding:10px;margin:6px 0;border:1px solid #ccc;border-radius:4px;font-size:15px;box-sizing:border-box}
button{background:#2874f0;color:#fff;border:none;font-weight:bold;cursor:pointer}
.hide{display:none}
.del-btn{background:#ff4444!important;color:white!important;border:none!important;padding:4px 10px!important;border-radius:3px!important;margin-left:10px!important;width:auto!important;display:inline-block!important;font-size:13px!important}
.item{display:flex;justify-content:space-between;align-items:center;margin:8px 0;padding:8px;background:#f8f8f8;border-radius:4px}
</style></head>
<body>
<div class="box" id="lBox">
<h2>🔐 Admin Login</h2>
<input type="password" id="pw" placeholder="Password daalo">
<button onclick="go()">Login</button>
</div>
<div class="box hide" id="aBox">
<h2>📦 Add Product</h2>
<input id="n" placeholder="Product Name">
<input id="p" type="number" placeholder="Price ₹">
<select id="c"><option value="">Category</option><option>Mobiles</option><option>Fashion</option><option>Electronics</option></select>
<input id="i" type="file" accept="image/*">
<button onclick="add()">Add Product to Store</button>
<div id="ls"></div>
</div>
<script>
const PS="Anil@123";let DT=JSON.parse(localStorage.getItem('aymart_products'))||[];
function go(){if(document.getElementById('pw').value===PS){lBox.classList.add('hide');aBox.classList.remove('hide');show()}else alert('Galat Password!')}
function add(){const n_=n.value,p_=p.value,c_=c.value,f=i.files[0];if(!n_||!p_||!c_||!f){alert('Sab bharo!');return}const r=new FileReader();r.onload=e=>{DT.unshift({id:Date.now(),name:n_,price:p_,cat:c_,img:e.target.result});localStorage.setItem('aymart_products',JSON.stringify(DT));alert('Product Added! Main site refresh karo');n.value=p.value=c.value=i.value='';show()};r.readAsDataURL(f)}
function show(){ls.innerHTML='<h3>Added Products:</h3>';DT.forEach(x=>{ls.innerHTML+=`<div class="item"><span><b>${x.name}</b> - ₹${x.price}</span><button class="del-btn" onclick="del(${x.id})">Delete</button></div>`})}
function del(id){if(confirm('Pakka delete karna hai?')){DT=DT.filter(x=>x.id!=id);localStorage.setItem('aymart_products',JSON.stringify(DT));alert('Product Delete Ho Gaya! Site refresh karo');show()}}
</script></body></html>
