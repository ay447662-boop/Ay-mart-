<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ay Mart Pro - Admin</title>
<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
.login,.admin{max-width:400px;margin:50px auto;background:#fff;padding:25px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
h2{color:#2874f0;text-align:center;margin-bottom:20px}
input,select,button{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:5px;font-size:16px;box-sizing:border-box}
button{background:#2874f0;color:#fff;border:none;cursor:pointer;font-weight:bold}
button:hover{background:#1a5fc2}
.hidden{display:none}
.logout{float:right;background:#ff6161;padding:6px 12px;font-size:12px;width:auto}
.item{background:#f9f9f9;padding:10px;margin:8px 0;border-radius:5px;display:flex;justify-content:space-between;align-items:center}
.item img{width:50px;height:50px;object-fit:cover;border-radius:4px}
.del{background:#ff6161;padding:4px 8px;font-size:11px;width:auto}
</style></head>
<body>
<div class="login" id="loginBox">
<h2>🔐 Admin Login</h2>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>
<div class="admin hidden" id="adminBox">
<button class="logout" onclick="logout()">Logout</button>
<h2>📦 Add Product</h2>
<input id="name" placeholder="Product Name">
<input id="price" type="number" placeholder="Price ₹">
<select id="cat"><option value="">Category</option><option>All</option><option>Mobiles</option><option>Fashion</option><option>Electronics</option><option>Home</option><option>Beauty</option></select>
<input id="img" type="file" accept="image/*">
<button onclick="addP()">Add Product to Store</button>
<div id="list"></div>
</div>
<script>
const P="Anil@123";let D=JSON.parse(localStorage.getItem('aymart_products'))||[];
function login(){if(document.getElementById('pass').value===P){document.getElementById('loginBox').classList.add('hidden');document.getElementById('adminBox').classList.remove('hidden');showP()}else alert('Wrong Password!')}
function logout(){document.getElementById('loginBox').classList.remove('hidden');document.getElementById('adminBox').classList.add('hidden');document.getElementById('pass').value=''}
function addP(){const n=document.getElementById('name').value,p=document.getElementById('price').value,c=document.getElementById('cat').value,f=document.getElementById('img').files[0];if(!n||!p||!c||!f){alert('Sab bharo!');return}const r=new FileReader();r.onload=e=>{D.unshift({id:Date.now(),name:n,price:p,cat:c,img:e.target.result});localStorage.setItem('aymart_products',JSON.stringify(D));alert('Product Added! Main site refresh karo.');document.getElementById('name').value='';document.getElementById('price').value='';document.getElementById('cat').value='';document.getElementById('img').value='';showP()};r.readAsDataURL(f)}
function showP(){const l=document.getElementById('list');l.innerHTML='<h3>Products:</h3>';D.forEach(x=>{l.innerHTML+=`<div class="item"><img src="${x.img}"><div><b>${x.name}</b><br>₹${x.price}-${x.cat}</div><button class="del" onclick="delP(${x.id})">Del</button></div>`})}
function delP(id){if(confirm('Delete?')){D=D.filter(x=>x.id!==id);localStorage.setItem('aymart_products',JSON.stringify(D));showP()}}
</script></body></html>
