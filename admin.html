<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ay-Mart Admin</title>
<style>
body{font-family:Arial;background:#f0f2f5;margin:0;padding:15px}
.box{max-width:500px;margin:0 auto;background:#fff;padding:20px;border-radius:12px}
input,select,button{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px;box-sizing:border-box}
button{background:#2874f0;color:#fff;border:0;font-weight:bold}
.preview{width:100%;height:180px;object-fit:contain;background:#fafafa;border:1px dashed #ccc;display:none}
.item{display:flex;gap:8px;border-bottom:1px solid #eee;padding:8px 0;align-items:center}
.item img{width:50px;height:50px;object-fit:cover;border-radius:6px}
</style>
</head>
<body>
<div class="box">
<h2 style="text-align:center;color:#2874f0">🛒 Ay-Mart Admin</h2>
<p style="text-align:center;font-size:11px;color:#666">ID:2396277 | Anil Yadav</p>
<input type="file" id="photo" accept="image/*">
<img id="prev" class="preview">
<input id="name" placeholder="Product Name * Ex: Ifazone Black Shirt">
<input id="brand" placeholder="Brand Ex: Ifazone">
<input id="price" type="number" placeholder="Price Ex: 699">
<input id="mrp" type="number" placeholder="MRP Ex: 1499">
<input id="disc" placeholder="Discount Ex: 53% OFF">
<input id="sku" placeholder="SKU Ex: IFZ-001">
<select id="cat"><option>Men Shirt</option><option>Perfume</option><option>Kit</option><option>Shoes</option><option>Watch</option></select>
<button onclick="save()">✅ Save & Add to Store</button>
<button onclick="copy()" style="background:#0a8a00">📋 GitHub Code Copy</button>
<h3>Products (<span id="c">0</span>)</h3><div id="list"></div>
</div>
<script>
let products=JSON.parse(localStorage.getItem('ay')||'[]'),b64="";
photo.onchange=e=>{let f=e.target.files[0];let r=new FileReader();r.onload=x=>{b64=x.target.result;prev.src=b64;prev.style.display='block'};r.readAsDataURL(f)}
function save(){let n=name.value.trim(),br=brand.value||'Ifazone',pr=+price.value,mr=+mrp.value||pr*2,di=disc.value||Math.round((1-pr/mr)*100)+'% OFF',sk=sku.value||'SKU'+Date.now();if(!n||!pr||!b64){alert('Name, Price, Photo jaruri hai');return}products.unshift({id:Date.now(),title:n,brand:br,price:pr,mrp:mr,disc:di,sku:sk,img:b64,rating:'4.6'});localStorage.setItem('ay',JSON.stringify(products));render();alert('Ho gaya!')}
function render(){c.innerText=products.length;let h='';products.forEach((p,i)=>{h+=`<div class=item><img src=${p.img}><div style=flex:1><b>${p.title}</b><br>₹${p.price} ${p.disc}</div><button onclick="del(${i})" style="width:auto;background:red;padding:4px 8px">X</button></div>`});list.innerHTML=h}
function del(i){products.splice(i,1);localStorage.setItem('ay',JSON.stringify(products));render()}
function copy(){let code='const MY_PRODUCTS='+JSON.stringify(products,null,2)+';';navigator.clipboard.writeText(code);alert('Copy ho gaya! index.html me paste karo')}
render();
</script>
</body>
</html>
